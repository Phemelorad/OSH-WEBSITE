<body>
<div class="navbar">
    <h1>BL Form 43/11 - Notification Medical Attendance</h1>
    <div class="user-info">
        <div class="user-details">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-department" id="userDepartment"></div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
</div>
<div class="page-container">
<div class="container">
<div class="form-card">
<div class="form-header">
<div class="gov-logo"><img src="Code-of-Arms-colour.png" alt="Republic of Botswana Coat of Arms"></div>
<h1>BL FORM 43/11</h1>
<h2>Notification of Time and Place of Attendance Upon Medical Practitioner</h2>
<div class="form-no">Worker's Compensation Act (Act No. 23 of 1998)</div>
</div>

<form id="attendanceForm">
<h3 class="section-title">1. Worker Details</h3>
<div class="form-row">
<div class="form-group"><label>Full Name of Worker</label><input type="text" name="worker_name" placeholder="Full name" required></div>
<div class="form-group"><label>ID Number</label><input type="text" name="worker_id_number" placeholder="Omang/Passport"></div>
</div>
<div class="form-row">
<div class="form-group full"><label>Full Address of Worker</label><textarea name="worker_address" rows="2" placeholder="Full address"></textarea></div>
</div>

<h3 class="section-title">2. Notice Details</h3>
<div class="form-row">
<div class="form-group"><label>Date of Notice</label><input type="date" name="date_of_notice"></div>
</div>

<h3 class="section-title">3. Medical Examination Details</h3>
<div class="form-row">
<div class="form-group full"><label>Name of Medical Practitioner</label><input type="text" name="practitioner_name" placeholder="Full name of medical practitioner" required></div>
</div>
<div class="form-row">
<div class="form-group"><label>Place of Examination</label><input type="text" name="place_of_examination" placeholder="Venue/location"></div>
<div class="form-group"><label>Date of Examination</label><input type="date" name="date_of_examination"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Time of Examination</label><input type="time" name="time_of_examination"></div>
</div>

<h3 class="section-title">4. Employer / Issuer Details</h3>
<div class="form-row form-row-3">
<div class="form-group"><label>Date of Notification</label><input type="date" name="notification_date"></div>
<div class="form-group"><label>Signature</label><input type="text" name="signature" placeholder="Signature"></div>
<div class="form-group"><label>Name of Signatory</label><input type="text" name="signatory_name" placeholder="Full name"></div>
</div>

<div class="btn-row">
<button type="button" class="btn btn-secondary" onclick="window.print()">Print</button>
<button type="submit" class="btn btn-primary">Submit</button>
</div>
</form>
</div>
</div>

<script src="supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="constants.js"></script>
<script src="role-permissions.js"></script>
<script src="modal.js"></script>
<script src="common.js"></script>
<script src="header.js"></script>
    <script>
  (function() {
    try {
      var found = Object.keys(localStorage).some(function(k) {
        return k.startsWith('sb-') && k.endsWith('-auth-token');
      });
      if (!found) window.location.href = 'index.html';
    } catch(e) { window.location.href = 'index.html'; }
  })();
</script>
<script src="nav.js"></script>
<script>window.OSH_ACTIVE_PAGE = 'bl-form-43-11';</script>
<script>
window.addEventListener('load', async function() {
    const authenticated = await isAuthenticated();
    if (!authenticated) { window.location.href = 'index.html'; return; }
    await initializeRoleSystem();
    const userResult = await getCurrentUser();
    if (!userResult.success || !userResult.user) return;
    const profileResult = await getUserProfile(userResult.user.id);
    const profile = profileResult.success ? profileResult.data : null;
    if (profile) {
        setUserNameSafely(profile.first_name + ' ' + profile.surname);
        var deptEl = document.getElementById('userDepartment');
        if (deptEl) deptEl.textContent = (typeof getRoleDisplayName === 'function' ? getRoleDisplayName(profile.role) : profile.role) || 'Department of Occupational Health & Safety';
    } else {
        setUserNameSafely(userResult.user.email.split('@')[0]);
    }

var formEl = document.getElementById('attendanceForm');
if (formEl) {
    formEl.addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = formEl.querySelector('button[type="submit"]');
        btn.textContent = 'Submitting...';
        btn.disabled = true;

        try {
            var payload = {};
            var inputs = formEl.querySelectorAll('[name]');
            inputs.forEach(function(inp) {
                var val = inp.type === 'checkbox' ? inp.checked : inp.value;
                if (inp.type === 'number' && val) val = parseFloat(val);
                if (val !== '') payload[inp.name] = val;
            });

            var user = await getCurrentUser();
            if (!user) { alert('You must be logged in.'); btn.textContent = 'Submit'; btn.disabled = false; return; }
            payload.submitted_by = user.id;

            var result = await supabaseClient
                .from('medical_attendance_notifications')
                .insert([payload])
                .select();

            if (result.error) throw result.error;
            alert('Form submitted successfully!');
            formEl.reset();
        } catch(err) {
            alert('Error: ' + err.message);
            console.error('Form submit error:', err);
        } finally {
            btn.textContent = 'Submit';
            btn.disabled = false;
        }
    });
}
});
</script></body>
</html>
