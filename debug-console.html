<script>
// ── Global Error Capture ──
window.__debugLog = [];

// Intercept console.error
var origConsoleError = console.error;
console.error = function() {
    var args = Array.prototype.slice.call(arguments);
    window.__debugLog.push({
        time: new Date().toISOString(),
        level: 'error',
        source: window.OSH_ACTIVE_PAGE || 'unknown',
        message: args.map(function(a) { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }).join(' ')
    });
    origConsoleError.apply(console, args);
};

// Intercept console.warn
var origConsoleWarn = console.warn;
console.warn = function() {
    var args = Array.prototype.slice.call(arguments);
    window.__debugLog.push({
        time: new Date().toISOString(),
        level: 'warn',
        source: window.OSH_ACTIVE_PAGE || 'unknown',
        message: args.map(function(a) { return typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a); }).join(' ')
    });
    origConsoleWarn.apply(console, args);
};

// Global error handler
window.onerror = function(message, source, lineno, colno, error) {
    window.__debugLog.push({
        time: new Date().toISOString(),
        level: 'error',
        source: source || 'global',
        message: message + ' (' + (lineno || '?') + ':' + (colno || '?') + ')'
    });
};

// Capture unhandled promise rejections
window.addEventListener('unhandledrejection', function(e) {
    window.__debugLog.push({
        time: new Date().toISOString(),
        level: 'error',
        source: 'promise',
        message: e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection'
    });
});
</script>

<script>

function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

    var el = document.getElementById('sysInfo');
    var html = '<div class="status">';

    html += '<b>Platform:</b> ' + escapeHtml(navigator.platform) + '<br>';

    html += '<b>DOM Ready:</b> ' + (document.readyState) + '<br>';
    html += '</div>';
    el.innerHTML = html;
}
