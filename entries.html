<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Entries - DOSH</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://*.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>

        .container {
            max-width: 1600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #333;
        }

        .stat-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .stat-value {
            color: #333;
            font-size: 28px;
            font-weight: 700;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-header h2 {
            color: #333;
            font-size: 22px;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .refresh-btn, .export-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #fff 0%, #f8f8f8 100%);
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .refresh-btn:hover, .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #f8f8f8;
        }

        th {
            text-align: left;
            padding: 12px;
            color: #333;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e0e0e0;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            color: #666;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #fafafa;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-under_review {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge-approved {
            background: #d4edda;
            color: #155724;
        }

        .badge-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-draft {
            background: #fff3cd;
            color: #856404;
        }

        .badge-cancelled {
            background: #e2e3e5;
            color: #383d41;
        }

        .badge-closed {
            background: #e2e3e5;
            color: #383d41;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .action-btn {
            padding: 5px 10px;
            margin: 0 3px;
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #f0f0f0;
        }

        /* Pagination */
        .pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            margin-top: 8px;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 12px;
        }
        .pagination-info {
            font-size: 13px;
            color: #888;
        }
        .pagination-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .pagination-buttons button {
            padding: 6px 14px;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .pagination-buttons button:hover:not(:disabled) {
            background: #f0f0f0;
        }
        .pagination-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination-buttons button.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        .page-size-select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            margin-left: 8px;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }
        }
    
/* ── Modal / Form view styles ── */
.rec-modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    z-index:9999; padding:20px;
}
.rec-modal {
    background:white; border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,0.18);
    width:100%; max-width:640px; max-height:85vh;
    overflow-y:auto; padding:28px 26px;
}
.rec-modal-header {
    display:flex; justify-content:space-between;
    align-items:flex-start; margin-bottom:20px;
    padding-bottom:16px; border-bottom:2px solid #f0f0f0;
}
.rec-modal-header h2 { margin:0; color:#222; font-size:17px; }
.rec-modal-header .subtitle { font-size:12px; color:#888; margin-top:2px; }
.rec-modal-close {
    width:32px; height:32px; border-radius:50%;
    border:none; background:#f5f5f5; cursor:pointer;
    font-size:18px; display:flex; align-items:center;
    justify-content:center; transition:all 0.2s; color:#555; flex-shrink:0;
}
.rec-modal-close:hover { background:#e0e0e0; }
.rec-modal-body { }
.rec-section {
    margin-bottom:16px; border:1px solid #e8e8e8;
    border-radius:12px; overflow:hidden;
}
.rec-section:last-child { margin-bottom:0; }
.rec-section-header {
    padding:12px 16px; font-size:12px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.5px;
    border-bottom:1px solid #f0f0f0;
}
.rec-section-header.worker { background:#fff3cd; color:#856404; border-bottom-color:#ffeeba; }
.rec-section-header.incident { background:#f8d7da; color:#721c24; border-bottom-color:#f5c6cb; }
.rec-section-header.employer { background:#e8f4fd; color:#0c5460; border-bottom-color:#bee5eb; }
.rec-section-header.report { background:#e2e3e5; color:#383d41; border-bottom-color:#d6d8db; }
.rec-section-body { padding:8px 16px; }
.rec-field {
    display:flex; justify-content:space-between;
    align-items:flex-start; padding:7px 0;
    border-bottom:1px solid #f8f8f8; gap:16px;
}
.rec-field:last-child { border-bottom:none; }
.rec-field .lbl { font-size:12px; color:#888; min-width:130px; flex-shrink:0; font-weight:500; }
.rec-field .val { font-size:13px; color:#333; text-align:right; line-height:1.4; font-weight:500; }

/* ── Form view modal styles ── */
.rec-form-modal {
    max-width: 1000px !important;
    width: 95% !important;
    max-height: 90vh !important;
    border-radius: 12px !important;
    overflow: hidden !important;
    display: flex;
    flex-direction: column;
}
.form-view-body {
    overflow-y: auto;
    padding: 0 !important;
    flex: 1;
    background: #f5f5f5;
}
.form-view-body .form-card {
    background: white; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    padding: 30px; margin: 20px;
    border: 1px solid #e0e0e0;
}
.form-view-body .form-header {
    text-align: center; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 2px solid #f0f0f0;
}
.form-view-body .form-header h1 { color: #333; font-size: 18px; margin-bottom: 4px; }
.form-view-body .form-header .subtitle { color: #666; font-size: 12px; line-height: 1.5; }
.form-view-body .section-title {
    color: #333; font-size: 14px; font-weight: 700;
    margin-bottom: 14px; padding: 8px 12px;
    background: #f5f5f5; border-left: 4px solid #333;
    border-radius: 0 6px 6px 0;
}
.form-view-body .section-title.claim { border-left-color: #6f42c1; }
.form-view-body .section-title.employer-title { border-left-color: #17a2b8; background: #e8f4fd; color: #0c5460; }
.form-view-body .section-title.injury-title { border-left-color: #dc3545; }
.form-view-body .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 14px;
}
.form-view-body .form-row-2 { grid-template-columns: repeat(2,1fr); }
.form-view-body .form-row-3 { grid-template-columns: repeat(3,1fr); }
.form-view-body .form-group { margin-bottom: 2px; }
.form-view-body .form-group label { display: block; color: #444; font-weight: 600; margin-bottom: 4px; font-size: 12px; }
.form-view-body .form-group input,
.form-view-body .form-group select,
.form-view-body .form-group textarea { width: 100%; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; box-sizing: border-box; }
.form-view-body .form-group input:disabled,
.form-view-body .form-group select:disabled,
.form-view-body .form-group textarea:disabled { background: #f9f9f9; color: #333; border-color: #e8e8e8; cursor: default; opacity: 1; -webkit-text-fill-color: #333; }
.form-view-body .gov-logo { display: flex; justify-content: center; margin-bottom: 8px; }
.form-view-body .gov-logo img { width: 60px; height: 46px; object-fit: contain; }
.form-view-body .rec-modal-actions { display: flex; gap: 8px; align-items: center; }
.form-view-body .rec-modal-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; font-family: inherit; background: white; transition: all 0.2s; }
.form-view-body .rec-modal-btn:hover { background: #f0f0f0; }
.form-view-body .rec-modal-btn.print { background: #333; color: white; border-color: #333; }
.form-view-body .rec-modal-btn.print:hover { background: #555; }
@media print {
    body * { visibility: hidden; }
    .rec-modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: white !important; z-index: 999999 !important; display: block !important; visibility: visible !important; }
    .rec-modal-overlay * { visibility: visible; }
    .rec-modal-header { display: none !important; }
    .rec-form-modal { max-width: 100% !important; width: 100% !important; max-height: none !important; box-shadow: none !important; border-radius: 0 !important; overflow: visible !important; }
    .form-view-body { overflow: visible !important; }
    .form-view-body .form-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; margin: 12px !important; }
    .form-view-body .form-group input:disabled, .form-view-body .form-group select:disabled, .form-view-body .form-group textarea:disabled { background: #fff !important; border-color: #ccc !important; }
}

    </style>
</head>

        </div>

<script>
        const supabaseClient = window.supabaseClient;
        let allClaims = [];

        // Check authentication on page load
        window.addEventListener('load', async function() {
            const authenticated = await isAuthenticated();
            
            if (!authenticated) {
                window.location.href = 'index.html';
                return;
            }

            // Initialize role system
            await initializeRoleSystem();
            await loadClaims();
            await populateIndustryFilter();
            
            // Enforce permissions
            enforcePermissions();
            
            // Dismiss new-claims badge with actual count
            try {
                const { count } = await SB.from('injury_claims').select('id', { count: 'exact', head: true }).eq('status', 'submitted');
                sessionStorage.setItem('new-claims_seen', String(count || 0));
            } catch(e) {}
        });

        async function loadClaims() {
            document.getElementById('claimsLoading').style.display = 'block';
            document.getElementById('claimsContent').style.display = 'none';

            try {
                let query = { view: 'injury_claims_view', excludeDrafts: true, orderBy: 'created_at' };

                // Apply filters
                const statusFilter = document.getElementById('filterStatus').value;
                const industryFilter = document.getElementById('filterIndustry').value;
                const companyFilter = document.getElementById('filterCompany').value;

                if (statusFilter) query.status = statusFilter;
                if (industryFilter) query.industry = industryFilter;
                if (companyFilter) query.employer_name = companyFilter;

                var claims = await window.loadClaims(query);

                allClaims = claims;

                // Update statistics
                updateStatistics(claims);

                // Render claims table
                renderClaimsTable(claims);

                document.getElementById('claimsLoading').style.display = 'none';
                document.getElementById('claimsContent').style.display = 'block';

            } catch (error) {
                console.error('Error loading claims:', error);
                document.getElementById('claimsLoading').innerHTML = 
                    `<div style="text-align: center; padding: 40px;">
                        <p style="color: #e74c3c; margin-bottom: 10px;">Error loading claims: ${error.message}</p>
                        <button onclick="loadClaims()" style="margin-top: 20px; padding: 10px 20px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer;">Retry</button>
                    </div>`;
            }
        }

        async function populateIndustryFilter() {
            // Load company list for filter dropdown
            try {
                var companiesRes = await supabaseClient.from('companies').select('company_name').order('company_name');
                if (companiesRes.data && companiesRes.data.length > 0) {
                    var comSel = document.getElementById('filterCompany');
                    if (comSel) {
                        companiesRes.data.forEach(function(c) {
                            var opt = document.createElement('option');
                            opt.value = c.company_name;
                            opt.textContent = c.company_name;
                            comSel.appendChild(opt);
                        });
                    }
                }
            } catch(e) { console.warn('Could not load companies:', e); }
            try {
                var industries = await loadUniqueIndustries();
                industries = industries.map(function(i) { return {industry: i}; });

                const uniqueIndustries = [...new Set(industries.map(i => i.industry))].sort();
                const select = document.getElementById('filterIndustry');
                
                uniqueIndustries.forEach(industry => {
                    const option = document.createElement('option');
                    option.value = industry;
                    option.textContent = industry;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading industries:', error);
            }
        }

        function updateStatistics(claims) {
            const total = claims.length;
            const pending = claims.filter(c => c.status === 'pending').length;
            const drafts = claims.filter(c => c.status === 'draft').length;
            const approved = claims.filter(c => c.status === 'approved').length;
            
            const submitted = claims.filter(c => c.status !== 'draft' && c.status !== 'cancelled');
            const avgIncapacity = submitted.length > 0
                ? (submitted.reduce((sum, c) => sum + parseFloat(c.incapacity_percentage), 0) / submitted.length).toFixed(1)
                : 0;

            document.getElementById('totalClaims').textContent = total;
            document.getElementById('pendingClaims').textContent = pending;
            document.getElementById('approvedClaims').textContent = approved;
            document.getElementById('draftClaims').textContent = drafts;
            document.getElementById('avgIncapacity').textContent = avgIncapacity + '%';
        }

        function renderClaimsTable(claims) {
            const tbody = document.getElementById('claimsTableBody');
            const emptyState = document.getElementById('emptyState');

            if (claims.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = claims.map(claim => {
                const canEdit = canEditClaims(claim.submitted_by);
                const editDisabled = !canEdit ? 'disabled' : '';
                const editTitle = !canEdit ? 'title="You can only edit your own claims"' : '';
                
                const fileCell = claim.status === 'draft'
                    ? '<em style="color:#856404">Awaiting submit</em>'
                    : `<strong>${claim.file_number || '—'}</strong>`;
                const completeBtn = claim.status === 'draft'
                    ? `<button class="action-btn" onclick="window.location.href='form.html?draft=${claim.id}'">Complete</button>`
                    : '';

                return `
                <tr>
                    <td>${fileCell}</td>
                    <td>${claim.name_of_claimant}</td>
                    <td>${claim.matched_employer || claim.name_of_employer}</td>
                    <td>${claim.industry}</td>
                    <td>${formatDate(claim.date_of_injury)}</td>
                    <td>${claim.location}</td>
                    <td><strong>${claim.incapacity_percentage}%</strong></td>
                    <td>
                        <span class="badge badge-${claim.status}">
                            ${claim.status.replace('_', ' ').toUpperCase()}
                        </span>
                    </td>
                    <td>${formatDate(claim.created_at)}</td>
                    <td>
                        ${completeBtn}
                        <button class="action-btn" onclick="viewClaim('${claim.id}')">View</button>
                        <button class="action-btn ${editDisabled}" ${editTitle} 
                            onclick="editStatus('${claim.id}', '${claim.status}', '${claim.submitted_by}')"
                            ${!canEdit || claim.status === 'draft' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                            Status
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric'
            });
        }

        function viewClaim(claimId) {
            var claim = allClaims.find(function(c) { return c.id === claimId; });
            if (!claim) return;
            window.location.href = 'form-43-02-wages.html?id=' + claimId + '&view=1';
        }


        async function editStatus(claimId, currentStatus, claimOwnerId) {
            if (!canEditClaims(claimOwnerId)) {
                showPermissionDenied('edit this claim');
                return;
            }

            const statuses = [
                { value: 'pending',      label: '🟡 Pending' },
                { value: 'under_review', label: '🔵 Under Review' },
                { value: 'approved',     label: '🟢 Approved' },
                { value: 'rejected',     label: '🔴 Rejected' },
                { value: 'closed',       label: '⚫ Closed' },
            ];

            const newStatus = await showSelect(
                `Current status: <strong>${currentStatus.replace('_',' ').toUpperCase()}</strong>`,
                statuses,
                currentStatus,
                { title: 'Update Claim Status', iconKey: 'status', confirmText: 'Update Status' }
            );

            if (!newStatus || newStatus === currentStatus) return;

            try {
                const { error } = await supabaseClient
                    .from('injury_claims').update({ status: newStatus }).eq('id', claimId);
                
                showToast('Status updated successfully', 'success');
                loadClaims();
            } catch (error) {
                await showAlert(error.message, { type: 'error', title: 'Update Failed' });
            }
        }

        function exportToCSV() {
            const headers = ['File Number', 'Claimant', 'Gender', 'Employer', 'Industry', 'Date of Injury', 'Date Reported', 'Date Received', 'Cause', 'Nature', 'Incapacity %', 'Location', 'Nationality', 'Status', 'Submitted'];
            
            const rows = allClaims.map(claim => [
                claim.file_number,
                claim.name_of_claimant,
                claim.gender,
                claim.name_of_employer,
                claim.industry,
                claim.date_of_injury,
                claim.date_reported,
                claim.date_received,
                claim.cause,
                claim.nature,
                claim.incapacity_percentage,
                claim.location,
                claim.nationality,
                claim.status,
                formatDate(claim.created_at)
            ]);

            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${cell}"`).join(','))
                .join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `injury_claims_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // -- Pagination --
        let currentPage = 1;
        let pageSize = 50;
        let totalPages = 1;
        let paginatedClaims = [];

        function applyPagination(claims) {
            currentPage = 1;
            paginatedClaims = claims;
            totalPages = Math.ceil(claims.length / pageSize) || 1;
            renderPage();
        }

        function renderPage() {
            const start = (currentPage - 1) * pageSize;
            const end = Math.min(start + pageSize, paginatedClaims.length);
            const pageClaims = paginatedClaims.slice(start, end);
            renderClaimsTable(pageClaims);
            updatePaginationControls();
            const controls = document.getElementById("paginationControls");
            controls.style.display = paginatedClaims.length > 0 ? "flex" : "none";
        }

        function updatePaginationControls() {
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(start + pageSize - 1, paginatedClaims.length);
            document.getElementById("paginationInfo").textContent =
                paginatedClaims.length > 0
                    ? "Showing " + start + "-" + end + " of " + paginatedClaims.length + " claims"
                    : "No claims";
            document.getElementById("firstPageBtn").disabled = currentPage <= 1;
            document.getElementById("prevPageBtn").disabled = currentPage <= 1;
            document.getElementById("nextPageBtn").disabled = currentPage >= totalPages;
            document.getElementById("lastPageBtn").disabled = currentPage >= totalPages;
            let html = "";
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }
            for (let i = startPage; i <= endPage; i++) {
                const active = i === currentPage ? "active" : "";
                html += "<button class=\"" + active + "\" onclick=\"goToPage(" + i + ")\">" + i + "</button>";
            }
            document.getElementById("pageNumbers").innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            document.querySelector(".table-container").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById("pageSizeSelect").value);
            totalPages = Math.ceil(paginatedClaims.length / pageSize) || 1;
            currentPage = 1;
            renderPage();
        }

        // Patch loadClaims to use pagination
        const origLoadClaims = loadClaims;
        loadClaims = async function() {
            document.getElementById("claimsLoading").style.display = "block";
            document.getElementById("claimsContent").style.display = "none";
            try {
                let query = supabaseClient.from("injury_claims_view").select("*").neq("status", "draft").order("created_at", { ascending: false });
                const statusFilter = document.getElementById("filterStatus").value;
                const industryFilter = document.getElementById("filterIndustry").value;
                const companyFilter = document.getElementById("filterCompany").value;
                if (statusFilter) query = query.eq("status", statusFilter);
                if (industryFilter) query = query.eq("industry", industryFilter);
                if (companyFilter) query = query.ilike("employer_name", "%" + companyFilter + "%");
                const { data: claims, error } = await query;
                
                allClaims = claims;
                updateStatistics(claims);
                applyPagination(claims);
                document.getElementById("claimsLoading").style.display = "none";
                document.getElementById("claimsContent").style.display = "block";
            } catch (error) {
                console.error("Error loading claims:", error);
                document.getElementById("claimsLoading").innerHTML =
                    "<div style=\"text-align:center;padding:40px;\"><p style=\"color:#e74c3c;margin-bottom:10px;\">Error loading claims: " + error.message + "</p><button onclick=\"loadClaims()\" style=\"margin-top:20px;padding:10px 20px;background:#333;color:white;border:none;border-radius:6px;cursor:pointer;\">Retry</button></div>";
            }
        };

    </script>
</body>
</html>
